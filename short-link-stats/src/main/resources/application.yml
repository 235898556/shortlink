# 服务端口
server:
  port: 8083

spring:
  application:
    name: short-link-stats

  # Nacos 配置中心 + 服务发现
  cloud:
    nacos:
      server-addr: 192.168.100.104:8848
      discovery:
        enabled: true
      config:
        enabled: true

    # ===================== RocketMQ 核心配置（缩进/参数全修正）=====================
    rocketmq:
      # NameServer 地址
      name-server: 192.168.100.104:9876
      # 生产者配置（你的服务会发送消息时使用）
      producer:
        group: stats-producer-group
        send-message-timeout: 3000
      # 消费者配置（批量消费点击统计消息，适配你的StatsService）
      consumer:
        group: stats-consumer-group          # 🔥 修复：必填消费组（原配置缺失）
        batch-consumer-enabled: true         # 开启批量消费
        pull-batch-size: 100                  # 批量拉取100条
        consume-thread-min: 32                # 消费核心线程
        consume-thread-max: 64                # 消费最大线程
        retry-times-when-failed: 3            # 消费失败重试3次

  # 从 Nacos 加载外部配置
  config:
    import: optional:nacos:short-link-stats.yaml

  # ===================== ShardingSphere 分表配置（适配你的按月分表）=====================
  shardingsphere:
    mode:
      type: Memory
    dataSources:
      stats-ds:
        dataSourceClassName: com.zaxxer.hikari.HikariDataSource
        driverClassName: com.mysql.cj.jdbc.Driver
        jdbcUrl: jdbc:mysql://localhost:3306/short_link_stats?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8&allowMultiQueries=true&allowPublicKeyRetrieval=true
        username: root
        password: root
        # 连接池优化（高并发必备）
        maximumPoolSize: 50
        minimumIdle: 15
        idleTimeout: 600000
        connectionTimeout: 30000

    rules:
      sharding:
        tables:
          t_click_stats:
            actualDataNodes: stats-ds.t_click_stats_${202501..203012}
            tableStrategy:
              standard:
                shardingColumn: click_time
                shardingAlgorithmName: month-inline

        shardingAlgorithms:
          month-inline:
            type: INLINE
            props:
              algorithm-expression: t_click_stats_${DateTimeFormatter.ofPattern("yyyyMM").format(click_time)}

    props:
      sql-show: false  # 🔥 修复：关闭SQL打印（生产环境性能杀手）

# ===================== MyBatis-Plus 优化配置 =====================
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl  # 关闭日志，提升性能
  global-config:
    db-config:
      id-type: auto

# ===================== Actuator 监控配置 =====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# ===================== 日志优化 =====================
logging:
  level:
    com.shortlink.stats: INFO
    org.apache.rocketmq: WARN
    com.baomidou.mybatisplus: WARN
    org.apache.shardingsphere: WARN