spring:
  application:
    name: short-link-core

  # 使用 ShardingSphereDriver，配置数据源
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:sharding.yml

  cloud:
    nacos:
      server-addr: 192.168.100.104:8848
      config:
        import-check:
          enabled: false
      discovery:
        server-addr: 192.168.100.104:8848

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# RocketMQ
rocketmq:
  name-server: 192.168.100.104:9876
  producer:
    group: shortlink-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

# 日志
logging:
  level:
    org.apache.shardingsphere: DEBUG
    com.shortlink: DEBUG
---
# Redis
spring:
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
            max-active: 1200  # 最大连接数（大幅提高）
            max-idle: 500     # 最大空闲连接
            min-idle: 100
            max-wait: 100ms